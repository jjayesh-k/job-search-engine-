# .github/workflows/daily_pipeline.yml
#
# Runs the full job search pipeline every day at 08:00 IST (02:30 UTC).
#
# What it does:
#   1. Fetches fresh jobs from Adzuna + Serpapi
#   2. Scores all jobs using RAG + skill-gap analysis (no Ollama in CI)
#   3. Writes shortlist CSV
#   4. Commits CSV to the repo
#   5. Sends Gmail notification with top 10 matches
#
# NOTE on Ollama in CI:
#   GitHub Actions runners do not have Ollama. We skip LLM summaries in CI
#   using --no-llm flag to keep the workflow fast and free.
#   Scores are still fully accurate. Run locally for LLM summaries.
#
# Required GitHub Secrets (Settings > Secrets > Actions > New repository secret):
#   ADZUNA_APP_ID       from developer.adzuna.com
#   ADZUNA_APP_KEY      from developer.adzuna.com
#   SERPAPI_KEY         from serpapi.com
#   GMAIL_SENDER        your.email@gmail.com
#   GMAIL_APP_PASSWORD  16-char Gmail App Password
#   GMAIL_RECIPIENT     where to deliver the shortlist

name: Daily Job Search Pipeline

on:
  schedule:
    - cron: "30 2 * * *"   # 08:00 IST = 02:30 UTC
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  run-pipeline:
    name: Fetch > Score > Notify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          ADZUNA_APP_ID=${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY=${{ secrets.ADZUNA_APP_KEY }}
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          GMAIL_SENDER=${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT=${{ secrets.GMAIL_RECIPIENT }}
          TARGET_COUNTRY=in
          MIN_FIT_SCORE=0.65
          RESUME_PATH=data/resume.pdf
          EOF

      - name: Verify resume PDF is committed
        run: |
          if [ ! -f "data/resume.pdf" ]; then
            echo "ERROR: data/resume.pdf not found in repo."
            echo "Run: git add data/resume.pdf && git commit -m 'add resume'"
            exit 1
          fi
          echo "Resume found: $(wc -c < data/resume.pdf) bytes"

      - name: Step 2 - Fetch jobs
        run: python main.py --fetch-only
        env:
          PYTHONPATH: .

      - name: Step 3 - Score jobs (no LLM in CI)
        run: python main.py --score-only --no-llm
        env:
          PYTHONPATH: .

      - name: Step 5 - Write CSV shortlist
        run: python -m src.output_csv
        env:
          PYTHONPATH: .

      - name: Send Gmail notification
        run: python -m src.notify
        env:
          PYTHONPATH: .

      - name: Commit shortlist CSV to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/shortlist_*.csv outputs/shortlist_latest.csv || true
          if git diff --staged --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "chore: daily shortlist $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-outputs-${{ github.run_id }}
          path: |
            outputs/raw_jobs.json
            outputs/scored_jobs.json
            outputs/shortlist_latest.csv
          retention-days: 7
